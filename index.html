<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pantry Planner">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>Pantry Planner</title>
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon.png">
<link rel="apple-touch-icon" sizes="167x167" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #2b88d9;
  --accent-light: #e8f3fc;
  --accent-mid: #7abcff;
  --accent-dark: #1a6db8;
  --accent-shadow: rgba(43,136,217,.25);
  --white: #ffffff;
  --gray-50: #f8f9fa; --gray-100: #f1f3f5; --gray-200: #e9ecef;
  --gray-300: #dee2e6; --gray-400: #ced4da; --gray-500: #adb5bd;
  --gray-600: #868e96; --gray-700: #495057; --gray-800: #343a40; --gray-900: #212529;
  --peach-bg:#fff5ee;--peach-border:#f0c9a6;--peach-text:#b87a42;
  --mint-bg:#eefaf5;--mint-border:#89d4b2;--mint-text:#2d8a5e;
  --lav-bg:#f5f0ff;--lav-border:#b8a0d8;--lav-text:#6b45a0;
  --star:#f0b429;--star-empty:#dce0e4;
  --r:12px;--r-sm:8px;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06);
  --shadow-md:0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.12);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{color-scheme:light only}
body{font-family:'DM Sans',system-ui,sans-serif;background:#ffffff;color:#212529;min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px}
input:focus,textarea:focus{border-color:var(--accent)!important;box-shadow:0 0 0 3px var(--accent-shadow)!important;outline:none}

/* ── Header ── */
.header{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--gray-200);padding:14px 16px}
.header-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center}
.header-left{display:flex;justify-content:flex-start}
.header-center{display:flex;flex-direction:column;align-items:center}
.header-right{display:flex;justify-content:flex-end}
.logo{font-family:'Fraunces',serif;font-size:28px;font-weight:700;color:var(--gray-900);line-height:1.1}
.logo span{color:var(--accent)}
.sub{font-size:11px;color:var(--gray-500);margin-top:2px;text-align:center}
.icon-btn{width:42px;height:42px;border-radius:var(--r-sm);border:1px solid var(--gray-200);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--gray-600);transition:all .12s}
.icon-btn:active{transform:scale(.93)}
.icon-btn:hover{border-color:var(--gray-300);background:var(--gray-50)}

/* ── Nav ── */
.nav{display:flex;border-bottom:1px solid var(--gray-200);padding:0 16px;background:var(--white);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav button{padding:10px 14px;border:none;background:none;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--gray-500);font-weight:400;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap;flex-shrink:0}
.nav button.active{color:var(--accent);font-weight:600;border-bottom-color:var(--accent)}

/* ── Kanban ── */
.kanban-wrap{display:flex;flex-direction:column;overflow:hidden}
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:0;flex:1;overflow:hidden;min-height:0;height:100%}
.kanban-col{border-right:1px solid var(--gray-100);display:flex;flex-direction:column;overflow:hidden;transition:background .15s}
.kanban-col:last-child{border-right:none}
.kanban-col.drag-over{background:var(--accent-light)}
.col-head{display:flex;align-items:center;gap:6px;padding:12px 10px 8px;flex-shrink:0;border-bottom:1px solid var(--gray-100)}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.col-label{font-size:11px;font-weight:600;color:var(--gray-700);text-transform:uppercase;letter-spacing:.4px}
.col-count{font-size:10px;color:var(--gray-500);background:var(--gray-100);border-radius:6px;padding:1px 6px;margin-left:auto}
.col-cards{flex:1;overflow-y:auto;padding:8px 10px;min-height:0;-webkit-overflow-scrolling:touch}
.col-cards::-webkit-scrollbar{width:2px}
.col-cards::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:2px}
.col-empty{border:1.5px dashed var(--gray-200);border-radius:var(--r);padding:20px 8px;text-align:center;font-size:11px;color:var(--gray-400);margin:4px 0}

/* ── Recipe cards ── */
.recipe-card{background:var(--white);border:1px solid var(--gray-200);border-left:3px solid var(--accent);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:box-shadow .12s,transform .12s;user-select:none;position:relative;box-shadow:0 2px 8px var(--accent-shadow)}
.recipe-card:hover{box-shadow:0 4px 14px var(--accent-shadow);transform:translateY(-1px)}
.recipe-card.dragging{opacity:.5;transform:rotate(2deg);cursor:grabbing}
.rc-name{font-family:'Fraunces',serif;font-size:13px;font-weight:600;color:var(--gray-800);margin-bottom:2px;line-height:1.3}
.rc-cuisine{font-size:11px;color:var(--gray-500)}
.rc-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:5px}
.rc-stars{display:inline-flex;gap:0;vertical-align:middle}
.drag-handle{position:absolute;top:8px;right:8px;color:var(--gray-300);font-size:12px;cursor:grab;padding:2px 4px;line-height:1}
.drag-handle:active{cursor:grabbing}

@media(max-width:700px){
  .kanban-wrap{height:auto;overflow:visible}
  .kanban{grid-template-columns:1fr;display:block;height:auto;overflow:visible}
  .kanban-col{border-right:none;border-bottom:1px solid var(--gray-100);max-height:36vh;display:flex;flex-direction:column}
  .col-cards{flex:1;overflow-y:auto;padding:8px 16px}
  .col-head{padding:10px 16px 8px}
}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(33,37,41,.35);backdrop-filter:blur(3px);z-index:1000;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .12s ease}
@media(min-width:600px){.overlay{align-items:center}.modal{border-radius:var(--r)!important;max-height:88vh}}
.modal{background:var(--white);border-radius:16px 16px 0 0;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;animation:slideUp .2s ease;box-shadow:var(--shadow-lg);padding-bottom:calc(16px + var(--safe-bottom));position:relative}
.modal-close{position:sticky;top:0;z-index:10;display:flex;justify-content:flex-end;padding:10px 14px 0;pointer-events:none}
.modal-close button{pointer-events:all;width:30px;height:30px;border-radius:50%;border:none;background:var(--gray-100);color:var(--gray-600);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;line-height:1}
.modal-close button:hover{background:var(--gray-200);color:var(--gray-900)}
.modal-inner{padding:4px 24px 8px}
.modal-handle{width:32px;height:4px;border-radius:2px;background:var(--gray-300);margin:10px auto 0}
.modal-title{font-family:'Fraunces',serif;font-size:21px;font-weight:600;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--gray-500);margin-bottom:20px;line-height:1.45}

/* ── Forms ── */
.field{margin-bottom:16px}
.field-label{font-size:11px;font-weight:600;color:var(--gray-500);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:5px}
.input{width:100%;padding:11px 13px;border-radius:var(--r-sm);border:1.5px solid var(--gray-300);font-size:14px;font-family:'DM Sans',sans-serif;background:var(--white);color:var(--gray-900);transition:all .12s}
.textarea{resize:vertical;min-height:80px;line-height:1.55}
.chip-group{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 13px;border-radius:16px;border:1.5px solid var(--gray-300);background:var(--white);color:var(--gray-600);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .12s;white-space:nowrap}
.chip.on{border-color:var(--accent);background:var(--accent-light);color:var(--accent-dark);font-weight:600}
.chip:active{transform:scale(.95)}
.btn-row{display:flex;gap:8px;margin-top:20px}
.btn{padding:11px 20px;border-radius:var(--r-sm);font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .12s;border:none;display:inline-flex;align-items:center;gap:6px;justify-content:center}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:var(--white)}
.btn-primary:hover{background:var(--accent-dark)}
.btn-ghost{background:var(--white);color:var(--gray-600);border:1.5px solid var(--gray-300)}
.btn-ghost:hover{background:var(--gray-50)}
.btn-danger{background:var(--white);color:#d44;border:1.5px solid #fcc}
.btn-full{width:100%}

/* ── Detail view ── */
.detail-section{margin-bottom:18px}
.detail-section-title{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.ingredient-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--gray-100);font-size:13px}
.ingredient-row:last-child{border-bottom:none}
.ing-name{color:var(--gray-800)}.ing-amount{color:var(--gray-500);font-weight:500;white-space:nowrap;margin-left:10px}
.step-row{display:flex;gap:10px;margin-bottom:11px;font-size:13px;line-height:1.55}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--accent-light);color:var(--accent);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.step-text{color:var(--gray-700)}

/* ── Tags ── */
.tag{display:inline-block;font-size:10px;padding:3px 9px;border-radius:6px;font-weight:600;white-space:nowrap}
.tag-wtt{background:var(--accent-light);color:var(--accent)}
.tag-cs{background:var(--peach-bg);color:var(--peach-text)}
.tag-c{background:var(--mint-bg);color:var(--mint-text)}
.tag-f{background:var(--lav-bg);color:var(--lav-text)}

/* ── Suggest / prompt ── */
.suggest-section{padding:16px 20px 80px}
.suggest-box{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--r);padding:18px;margin-bottom:14px}
.suggest-box h3{font-family:'Fraunces',serif;font-size:16px;font-weight:600;margin-bottom:5px}
.suggest-box p{font-size:13px;color:var(--gray-500);line-height:1.45;margin-bottom:12px}
.prompt-box{background:var(--gray-50);border-radius:var(--r-sm);padding:14px;font-size:12px;line-height:1.65;color:var(--gray-700);white-space:pre-wrap;max-height:280px;overflow-y:auto;border:1px solid var(--gray-200);font-family:monospace}

/* ── Shopping list ── */
.shop-section{padding:14px 20px 80px}
.shop-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--gray-100);font-size:14px}
.shop-item:last-child{border-bottom:none}
.shop-item input[type=checkbox]{width:17px;height:17px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.shop-item.done .shop-name{text-decoration:line-through;color:var(--gray-400)}
.shop-name{flex:1;color:var(--gray-800)}
.shop-amount{color:var(--gray-500);font-size:12px;white-space:nowrap}
.shop-source{font-size:11px;color:var(--gray-400);margin-left:4px}
.shop-group{margin-bottom:20px}
.shop-group-title{font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--gray-200)}

/* ── Empty / toast / fab ── */
.empty-state{text-align:center;padding:40px 20px;color:var(--gray-400);font-size:13px}
.empty-icon{font-size:38px;margin-bottom:10px;display:block}
.toast{position:fixed;bottom:calc(30px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:var(--gray-800);color:var(--white);padding:9px 20px;border-radius:20px;font-size:12.5px;font-weight:500;z-index:2000;animation:popIn .15s ease;box-shadow:var(--shadow-md);white-space:nowrap}
.fab{position:fixed;bottom:calc(20px + var(--safe-bottom));right:20px;width:52px;height:52px;border-radius:50%;border:none;background:var(--accent);color:var(--white);font-size:26px;font-weight:300;cursor:pointer;box-shadow:0 4px 16px var(--accent-shadow);z-index:200;display:flex;align-items:center;justify-content:center;transition:transform .1s,background .12s}
.fab:active{transform:scale(.9)}
.fab:hover{background:var(--accent-dark)}
.star-btn{background:none;border:none;cursor:pointer;padding:2px;display:inline-flex;vertical-align:middle;transition:transform .1s}
.star-btn:hover{transform:scale(1.2)}

/* ── Prefs modal extras ── */
.prefs-section{margin-bottom:22px;padding-bottom:22px;border-bottom:1px solid var(--gray-100)}
.prefs-section:last-of-type{border-bottom:none}
.prefs-section-title{font-family:'Fraunces',serif;font-size:15px;font-weight:600;color:var(--gray-800);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.colour-row{display:flex;align-items:center;gap:12px}
.colour-preview{width:36px;height:36px;border-radius:50%;border:3px solid var(--white);box-shadow:0 0 0 1.5px var(--gray-300);cursor:pointer;transition:transform .12s}
.colour-preview:hover{transform:scale(1.08)}
.colour-presets{display:flex;gap:8px;flex-wrap:wrap}
.colour-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .12s}
.colour-dot.active{border-color:var(--gray-800);transform:scale(1.1)}
input[type=color]{opacity:0;position:absolute;width:0;height:0}

/* ── Import modal ── */
.paste-area{width:100%;min-height:160px;padding:12px;border-radius:var(--r-sm);border:1.5px dashed var(--gray-300);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--gray-700);line-height:1.5;resize:vertical;background:var(--gray-50)}
.paste-area:focus{outline:none;border-color:var(--accent);background:var(--white)}
.parsed-preview{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--r-sm);padding:14px;margin-top:12px;font-size:13px}
.parsed-preview strong{display:block;font-weight:600;color:var(--gray-800);margin-bottom:4px}
.parsed-preview span{color:var(--gray-500)}
.section-divider{height:1px;background:var(--gray-100);margin:6px 0 16px}

/* ── All list search ── */
.search-wrap{padding:12px 20px 10px;position:sticky;top:0;background:var(--white);z-index:10;border-bottom:1px solid var(--gray-100)}
.search-input-wrap{position:relative}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--gray-400);font-size:14px;pointer-events:none}
.search-input{padding-left:34px}
</style>
</head>

/* ── Persistence ── */
function load(){
  try{const d=localStorage.getItem(SK);if(d)S={...S,...JSON.parse(d)}}catch(e){}
  applyAccent(S.accent||'#8AD0FF');
}
function save(){try{localStorage.setItem(SK,JSON.stringify(S))}catch(e){}}

/* ── Accent colour ── */
function applyAccent(hex){
  S.accent=hex;
  const r=document.documentElement.style;
  r.setProperty('--accent',hex);
  r.setProperty('--accent-dark',shadeHex(hex,-30));
  r.setProperty('--accent-light',hexWithAlpha(hex,0.1));
  r.setProperty('--accent-mid',hexWithAlpha(hex,0.5));
  r.setProperty('--accent-shadow',hexWithAlpha(hex,0.25));
}
function shadeHex(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,Math.min(255,r+amt));g=Math.max(0,Math.min(255,g+amt));b=Math.max(0,Math.min(255,b+amt));
  return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}
function hexWithAlpha(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgba(${r},${g},${b},${a})`;
}

/* ── Utils ── */
function toast(m){clearTimeout(toastT);document.querySelector('.toast')?.remove();const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);toastT=setTimeout(()=>t.remove(),2400)}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function tagHtml(status){return`<span class="tag tag-${TAG_CLS[status]||'wtt'}">${esc(status)}</span>`}
function parseIngredients(raw){if(!raw)return[];return raw.split('\n').filter(l=>l.trim()).map(l=>{const m=l.match(/^(.+?):\s*(.+)$/);return m?{name:m[1].trim(),amount:m[2].trim()}:{name:l.trim(),amount:''}})}
function parseSteps(raw){if(!raw)return[];return raw.split('\n').filter(l=>l.trim()).map(l=>l.replace(/^\d+[\.\)]\s*/,'').trim())}

/* ── Stars (fixed — no arguments.callee) ── */
function starSvg(filled,sz=16){
  return`<svg width="${sz}" height="${sz}" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="${filled?'var(--star)':'var(--star-empty)'}" stroke="${filled?'#dea015':'#ccd0d4'}" stroke-width="0.5"/></svg>`;
}
function starsDisplay(r,sz=13){let h='';for(let i=1;i<=5;i++)h+=starSvg(r>=i,sz);return`<span class="rc-stars">${h}</span>`}
function dumplingImg(rating,sz=36){
  const src=DUMPLING_IMGS[rating];
  if(!src)return'';
  return`<img src="${src}" alt="${rating} star" style="width:${sz}px;height:${sz}px;object-fit:contain;display:inline-block;vertical-align:middle;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.10))">`;
}
function bindStars(containerId,currentRating,sz,onChange){
  const el=document.getElementById(containerId);if(!el)return;
  function render(rating){
    el.innerHTML='';
    for(let i=1;i<=5;i++){
      const btn=document.createElement('button');
      btn.className='star-btn';
      btn.setAttribute('aria-label','Rate '+i+' stars');
      btn.innerHTML=starSvg(rating>=i,sz);
      btn.addEventListener('click',e=>{
        e.stopPropagation();
        const nv=rating===i?0:i;
        onChange(nv);
        render(nv);
      });
      el.appendChild(btn);
    }
  }
  render(currentRating);
}

/* ── Suggestions ── */
function getSuggestions(){
  const cooked=S.recipes.filter(r=>(r.status==='Cooked'||r.status==='Favourite')&&r.rating>0);
  if(!cooked.length)return[];
  const cw={};cooked.forEach(r=>{if(r.cuisine)cw[r.cuisine]=(cw[r.cuisine]||0)+r.rating/5});
  const pc=new Set(S.preferences.cuisines||[]);
  return S.recipes.filter(r=>r.status==='Want to Try').map(r=>{
    let sc=2;
    if(r.cuisine&&cw[r.cuisine])sc+=cw[r.cuisine]*1.5;
    if(r.cuisine&&pc.has(r.cuisine))sc+=3;
    return{...r,score:sc,reason:'Matches your rated favourites'};
  }).sort((a,b)=>b.score-a.score).slice(0,6);
}

/* ── Prompt generation (strict format for paste-back) ── */
function genPrompt(){
  const p=S.preferences;
  const rated=S.recipes.filter(r=>r.rating>0).sort((a,b)=>b.rating-a.rating);
  const top=rated.filter(r=>r.rating>=4).slice(0,8);
  const low=rated.filter(r=>r.rating<=2).slice(0,4);
  let t=`I need recipe suggestions based on my cooking history. Please give me 5–8 complete recipes.\n\n`;
  t+=`My preferred cuisines: ${(p.cuisines||[]).join(', ')||'No preference'}\n`;
  if(p.dietaryNotes)t+=`Dietary notes: ${p.dietaryNotes}\n`;
  if(p.favIngredients)t+=`Favourite ingredients: ${p.favIngredients}\n`;
  t+=`\nRecipes I've loved (4–5 stars):\n`;
  if(top.length)top.forEach(r=>{t+=`- ${r.name}${r.cuisine?' ('+r.cuisine+')':''} — ${r.rating}/5\n`});else t+=`- (none yet)\n`;
  t+=`\nRecipes I rated lower (1–2 stars):\n`;
  if(low.length)low.forEach(r=>{t+=`- ${r.name}${r.cuisine?' ('+r.cuisine+')':''} — ${r.rating}/5\n`});else t+=`- (none yet)\n`;
  t+=`\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nIMPORTANT — Reply using EXACTLY this format for each recipe. Do not deviate.\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;
  t+=`##RECIPE_START\n##NAME: Recipe Name Here\n##CUISINE: Cuisine Type\n##TIME: 30 mins\n##WHY: One sentence on why I'll like it.\n##INGREDIENTS\nIngredient name: amount\nIngredient name: amount\n##STEPS\n1. First step\n2. Second step\n##NOTES: Any optional notes.\n##RECIPE_END\n\n`;
  t+=`Repeat the ##RECIPE_START … ##RECIPE_END block for each recipe. Do not add any text outside these blocks.`;
  return t;
}

/* ── AI paste parser ── */
function parseAIResponse(text){
  const recipes=[];
  const blocks=text.split(/##RECIPE_START/).slice(1);
  for(const block of blocks){
    const end=block.indexOf('##RECIPE_END');
    const content=end>=0?block.slice(0,end):block;
    const get=(tag)=>{const m=content.match(new RegExp('##'+tag+':\\s*(.+?)(?=\\n##|$)','s'));return m?m[1].trim():''};
    const name=get('NAME');if(!name)continue;
    // ingredients block
    const ingMatch=content.match(/##INGREDIENTS\n([\s\S]*?)(?=\n##|$)/);
    const ingredients=ingMatch?ingMatch[1].trim():'';
    // steps block
    const stepsMatch=content.match(/##STEPS\n([\s\S]*?)(?=\n##|$)/);
    const steps=stepsMatch?stepsMatch[1].trim():'';
    recipes.push({
      name,
      cuisine:get('CUISINE'),
      cookTime:get('TIME'),
      source:'AI suggested',
      ingredients,
      steps,
      notes:get('NOTES'),
      status:'Want to Try',
      rating:0
    });
  }
  return recipes;
}

/* ── Modal helpers ── */
function openModal(fn){
  closeModal();

  ov.addEventListener('click',e=>{if(e.target===ov)closeModal()});
  const m=document.createElement('div');m.className='modal';
  m.innerHTML='<div class="modal-handle"></div><div class="modal-close"><button onclick="closeModal()" aria-label="Close">✕</button></div><div class="modal-inner" id="modal-body"></div>';
  ov.appendChild(m);document.body.appendChild(ov);
  fn(document.getElementById('modal-body'));
}
function closeModal(){document.getElementById('modal-overlay')?.remove()}

/* ── Import / Export ── */
function exportAll(){
  const data=JSON.stringify(S,null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='pantry-planner-backup.json';a.click();
  toast('⬇️ Exported all data');
}
function exportRecipe(id){
  const r=S.recipes.find(x=>x.id===id);if(!r)return;
  let t='##RECIPE_START\n';
  t+=`##NAME: ${r.name}\n`;
  if(r.cuisine)t+=`##CUISINE: ${r.cuisine}\n`;
  if(r.cookTime)t+=`##TIME: ${r.cookTime}\n`;
  if(r.source)t+=`##WHY: ${r.source}\n`;
  t+=`##INGREDIENTS\n${r.ingredients||''}\n`;
  t+=`##STEPS\n${r.steps||''}\n`;
  if(r.notes)t+=`##NOTES: ${r.notes}\n`;
  t+='##RECIPE_END\n';
  const blob=new Blob([t],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=r.name.replace(/[^a-z0-9]/gi,'_').toLowerCase()+'.txt';a.click();
  toast('⬇️ Recipe exported');
}
function openImport(){
  openModal(el=>{
    el.innerHTML=`
      <h2 class="modal-title">⬆️ Import Data</h2>
      <p class="modal-sub">Import a previously exported JSON file. You can merge with existing data or replace everything.</p>
      <div style="border:1.5px dashed var(--gray-300);border-radius:var(--r);padding:28px;text-align:center;cursor:pointer;color:var(--gray-500)" id="drop-zone">
        <div style="font-size:28px;margin-bottom:6px">📁</div>
        <div style="font-size:14px">Click to select a file</div>
        <div style="font-size:12px;margin-top:4px">.txt recipe export or .json backup — drag & drop ok</div>
        <input type="file" id="imp-file" accept=".json,.txt" style="position:absolute;opacity:0;width:0;height:0">
      </div>
      <div id="imp-preview" style="margin-top:12px"></div>
      <div class="btn-row" id="imp-actions" style="display:none">
        <button class="btn btn-ghost" id="imp-merge" style="flex:1">Merge (keep existing)</button>
        <button class="btn btn-primary" id="imp-replace" style="flex:1">Replace all</button>
      </div>
      <div class="btn-row"><button class="btn btn-ghost btn-full" onclick="closeModal()">Cancel</button></div>`;
    let importedData=null;
    const dz=document.getElementById('drop-zone');
    const fi=document.getElementById('imp-file');
    dz.addEventListener('click',()=>fi.click());
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.borderColor='var(--accent)'});
    dz.addEventListener('dragleave',()=>{dz.style.borderColor='var(--gray-300)'});
    dz.addEventListener('drop',e=>{e.preventDefault();dz.style.borderColor='var(--gray-300)';handleFile(e.dataTransfer.files[0])});
    fi.addEventListener('change',()=>handleFile(fi.files[0]));
    function handleFile(file){
      if(!file)return;
      const reader=new FileReader();
      reader.onload=e=>{
        try{
          const text=e.target.result;
          const prev=document.getElementById('imp-preview');
          const act=document.getElementById('imp-actions');
          // .txt single recipe export
          if(file.name.endsWith('.txt')||text.includes('##RECIPE_START')){
            const parsed=parseAIResponse(text);
            if(!parsed.length){prev.innerHTML='<div style="color:#d44;font-size:13px">⚠️ No recipes found in file</div>';act.style.display='none';return}
            importedData={recipes:parsed,isTxt:true};
            prev.innerHTML=`<div class="parsed-preview"><strong>${parsed.length===1?'Single recipe':'Multiple recipes'} detected</strong><span>${parsed.map(r=>r.name).join(', ')}</span></div>`;
            act.innerHTML=`<button class="btn btn-primary btn-full" id="imp-single">Add ${parsed.length===1?'this recipe':'these recipes'}</button>`;
            act.style.display='flex';
            return;
          }
          // .json backup
          importedData=JSON.parse(text);
          const isFullBackup=importedData.recipes&&Array.isArray(importedData.recipes);
          if(isFullBackup){
            prev.innerHTML=`<div class="parsed-preview"><strong>Full backup detected</strong><span>${importedData.recipes.length} recipes found</span></div>`;
            act.innerHTML=`<button class="btn btn-ghost" id="imp-merge" style="flex:1">Merge (keep existing)</button><button class="btn btn-primary" id="imp-replace" style="flex:1">Replace all</button>`;
            act.style.display='flex';
          } else {
            prev.innerHTML='<div style="color:#d44;font-size:13px">⚠️ File format not recognised. Expected a .txt recipe export or .json backup.</div>';
            act.style.display='none';
          }
        }catch(err){document.getElementById('imp-preview').innerHTML='<div style="color:#d44;font-size:13px">⚠️ Could not read file</div>'}
      };
      reader.readAsText(file);
    }
    document.getElementById('imp-actions').addEventListener('click',e=>{
      if(!importedData)return;
      if(e.target.id==='imp-merge'||e.target.id==='imp-single'){
        const toAdd=importedData.recipes||[];
        let added=0;
        toAdd.forEach(r=>{
          r.id=S.nextId++;r.createdAt=r.createdAt||Date.now();
          S.recipes.push(r);added++;
        });
        save();closeModal();render();toast(`✅ Added ${added} recipe${added!==1?'s':''}`);
      } else if(e.target.id==='imp-replace'){
        if(!confirm(`Replace ALL existing data with the imported backup? This cannot be undone.`))return;
        S={...importedData};
        applyAccent(S.accent||'#8AD0FF');
        save();closeModal();render();toast('✅ Data replaced');
      }
    });
  });
}

/* ── Shopping list ── */
function renderShoppingList(){
  const cookingSoon=S.recipes.filter(r=>r.status==='Cooking Soon');
  const app=document.getElementById('app');
  let h=renderHeader();
  h+=renderNav();
  h+='<div class="shop-section">';
  if(!cookingSoon.length){
    h+='<div class="empty-state"><span class="empty-icon">🛒</span>No recipes marked "Cooking Soon"<br><span style="font-size:12px;margin-top:6px;display:block">Move recipes to Cooking Soon to build your shopping list</span></div>';
  } else {
    // Merge identical ingredient names (exact match, case-insensitive key, preserve original case)
    const merged={}; // key=name.toLowerCase() → {name, amounts:[], sources:[]}
    cookingSoon.forEach(r=>{
      parseIngredients(r.ingredients).forEach(ing=>{
        const key=ing.name.toLowerCase().trim();
        if(!merged[key]){merged[key]={name:ing.name,amounts:[],sources:[]};}
        if(ing.amount)merged[key].amounts.push(ing.amount);
        merged[key].sources.push(r.name);
      });
    });
    const items=Object.values(merged);
    const dupes=items.filter(i=>i.sources.length>1).length;
    h+=`<div style="font-size:13px;color:var(--gray-500);margin-bottom:16px">${items.length} ingredient${items.length!==1?'s':''} from ${cookingSoon.length} recipe${cookingSoon.length!==1?'s':''}${dupes?` · ${dupes} combined`:''}.</div>`;
    items.forEach((ing,idx)=>{
      const cbId=`si-${idx}`;
      const amountStr=ing.amounts.length?ing.amounts.join(', '):'';
      const fromMultiple=ing.sources.length>1;
      h+=`<div class="shop-item" id="row-${cbId}">
        <input type="checkbox" id="${cbId}" onchange="toggleShopItem('${cbId}')">
        <label for="${cbId}" class="shop-name" style="cursor:pointer">${esc(ing.name)}${fromMultiple?` <span style="font-size:10px;color:var(--gray-400)">(×${ing.sources.length})</span>`:''}</label>
        ${amountStr?`<span class="shop-amount">${esc(amountStr)}</span>`:''}
      </div>`;
    });
  }
  h+='</div>';
  h+='<button class="fab" onclick="openForm()">+</button>';
  app.innerHTML=h;
}
function toggleShopItem(id){
  const row=document.getElementById('row-'+id);
  const cb=document.getElementById(id);
  if(row)row.classList.toggle('done',cb.checked);
}

    colEl.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move'});
    colEl.addEventListener('dragenter',e=>colEl.classList.add('drag-over'));
    colEl.addEventListener('dragleave',e=>{if(!colEl.contains(e.relatedTarget))colEl.classList.remove('drag-over')});
    colEl.addEventListener('drop',e=>{e.preventDefault();colEl.classList.remove('drag-over');if(dragId!==null){S.recipes=S.recipes.map(r=>r.id===dragId?{...r,status:col}:r);save();render();toast('Moved to '+col)}});
  });
  // Touch drag (unchanged logic, works alongside tap-to-open)
  let tCard=null,tClone=null,tId=null,tMoved=false,tTimer=null;
  document.querySelectorAll('.recipe-card[draggable]').forEach(card=>{
    const id=parseInt(card.dataset.id);
    card.addEventListener('touchstart',e=>{tMoved=false;tId=id;tCard=card;tTimer=setTimeout(()=>{if(!tMoved&&tCard===card){tClone=card.cloneNode(true);tClone.style.cssText='position:fixed;width:'+card.offsetWidth+'px;opacity:.85;z-index:9999;pointer-events:none;transform:rotate(2deg) scale(1.04);box-shadow:0 8px 24px rgba(0,0,0,.15)';document.body.appendChild(tClone);card.style.opacity='.3'}},200)},{passive:true});
    card.addEventListener('touchmove',e=>{tMoved=true;if(!tClone)return;e.preventDefault();const t=e.touches[0];tClone.style.left=(t.clientX-tClone.offsetWidth/2)+'px';tClone.style.top=(t.clientY-30)+'px';document.querySelectorAll('.kanban-col').forEach(c=>{const r=c.getBoundingClientRect();c.classList.toggle('drag-over',t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom)})},{passive:false});
    card.addEventListener('touchend',e=>{clearTimeout(tTimer);if(tClone){tClone.remove();tClone=null;card.style.opacity='1';const t=e.changedTouches[0];document.querySelectorAll('.kanban-col').forEach((c,idx)=>{c.classList.remove('drag-over');const r=c.getBoundingClientRect();if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom&&tId!==null){S.recipes=S.recipes.map(rx=>rx.id===tId?{...rx,status:COLS[idx]}:rx);save();render();toast('Moved to '+COLS[idx])}})}else if(!tMoved&&tId!==null){openDetail(tId)}tCard=null;tId=null;tMoved=false});
  });
}

/* ── Render helpers ── */
function renderHeader(){
  return`<header class="header"><div class="header-row"><div class="header-left"><button class="icon-btn" onclick="openPrefs()" title="Settings">⚙️</button></div><div class="header-center"><div class="logo">Pantry <span>Planner</span></div><div class="sub">${S.recipes.length} recipe${S.recipes.length!==1?'s':''}</div></div><div class="header-right"><button class="icon-btn" onclick="openAIImport()" title="Import AI recipes">🤖</button></div></div></header>`;
}
function renderNav(){
  const tabs=[{id:'board',label:'📋 Board'},{id:'all',label:'🔍 All'},{id:'shop',label:'🛒 Shopping'},{id:'suggest',label:'✨ Suggest'}];
  return`<nav class="nav">${tabs.map(t=>`<button class="${currentView===t.id?'active':''}" onclick="currentView='${t.id}';render()">${t.label}</button>`).join('')}</nav>`;
}

/* ── Main render ── */
function render(){
  if(currentView==='shop'){renderShoppingList();return}
  const app=document.getElementById('app');
  let h=renderHeader()+renderNav();

  if(currentView==='board'){
    h+='<div class="kanban-wrap"><div class="kanban">';
    COLS.forEach(col=>{
      const items=S.recipes.filter(r=>r.status===col);
      h+=`<div class="kanban-col" id="kc-${TAG_CLS[col]}">
        <div class="col-head"><div class="col-dot" style="background:${COL_DOT[col]}"></div><span class="col-label">${col}</span><span class="col-count">${items.length}</span></div>
        <div class="col-cards" id="cards-${TAG_CLS[col]}">`;
      if(!items.length)h+='<div class="col-empty">Drop recipes here</div>';
      items.forEach(r=>{
        h+=`<div class="recipe-card" draggable="true" data-id="${r.id}">
          <div class="drag-handle" title="Drag to move">⠿</div>
          <div class="rc-name">${esc(r.name)}</div>
          <div class="rc-bottom">
            <span class="rc-cuisine">${esc(r.cuisine||'')}</span>
            ${r.rating>0?dumplingImg(r.rating,34):''}
          </div>
          ${r.cookTime?`<div style="font-size:11px;color:var(--gray-400);margin-top:3px">⏱ ${esc(r.cookTime)}</div>`:''}
        </div>`;
      });
      h+='</div></div>';
    });
    h+='</div></div>';

  } else if(currentView==='all'){
    h+=`<div class="search-wrap">
      <div class="search-input-wrap" style="margin-bottom:8px"><span class="search-icon">🔍</span><input class="input search-input" id="search-input" placeholder="Search by name or cuisine…"></div>
      <div class="search-input-wrap" style="margin-bottom:8px"><span class="search-icon">🥕</span><input class="input search-input" id="ing-input" placeholder="Filter by ingredient (e.g. chicken, garlic)…"></div>
      <select class="input" id="time-filter" style="color:var(--gray-700)">
        <option value="">⏱ Any cook time</option>
        <option value="15">Under 15 mins</option>
        <option value="30">Under 30 mins</option>
        <option value="45">Under 45 mins</option>
        <option value="60">Under 1 hour</option>
        <option value="90">Under 1.5 hours</option>
        <option value="91">1.5 hours+</option>
      </select>
    </div><div id="all-list" style="padding:12px 20px 80px"></div>`;

  } else {
    // Suggest
    h+=`<div class="suggest-section">
      <div class="suggest-box">
        <h3>✨ Get AI Suggestions</h3>
        <p>Generate a prompt tailored to your taste history and preferences. Paste it into Claude, then import the response directly back into the app.</p>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary btn-full" onclick="openPromptModal()">📋 Generate prompt</button>
          <button class="btn btn-ghost btn-full" onclick="openAIImport()">🤖 Import AI response</button>
        </div>
      </div>`;
    const sugg=getSuggestions();
    if(sugg.length){
      h+=`<div style="font-family:'Fraunces',serif;font-size:15px;font-weight:600;margin:16px 0 10px">Try Next</div>`;
      sugg.forEach(r=>{h+=`<div class="recipe-card" onclick="openDetail(${r.id})"><div class="rc-name">${esc(r.name)}</div><div style="display:flex;align-items:center;gap:8px;margin-top:4px"><span style="font-size:11px;color:var(--gray-400)">${esc(r.reason)}</span>${r.rating>0?dumplingImg(r.rating,34):''}</div></div>`});
    }
    if(!S.recipes.some(r=>r.rating>0)){h+='<div class="empty-state"><span class="empty-icon">🍳</span>Rate some recipes to unlock suggestions</div>'}
    h+='</div>';
  }

  h+='<button class="fab" onclick="openForm()">+</button>';
  app.innerHTML=h;

  if(currentView==='board'){
    setupDrag();
    // Set kanban height to fill remaining viewport after header+nav
    const kw=document.querySelector('.kanban-wrap');
    if(kw){
      const top=kw.getBoundingClientRect().top;
      kw.style.height=(window.innerHeight-top)+'px';
    }
  }
  if(currentView==='all'){
    // Parse cook time string → minutes (best effort)
    function parseMins(str){
      if(!str)return null;
      const s=str.toLowerCase();
      let mins=0;
      const h=s.match(/(\d+\.?\d*)\s*h/);const m=s.match(/(\d+\.?\d*)\s*m/);
      if(h)mins+=parseFloat(h[1])*60;
      if(m)mins+=parseFloat(m[1]);
      if(!h&&!m){const n=s.match(/(\d+)/);if(n)mins=parseInt(n[1]);}
      return mins>0?mins:null;
    }
    const inp=document.getElementById('search-input');
    const ingInp=document.getElementById('ing-input');
    const timeFilter=document.getElementById('time-filter');
    const rl=()=>{
      const q=(inp?.value||'').toLowerCase();
      const iq=(ingInp?.value||'').toLowerCase();
      const tv=timeFilter?.value||'';
      const list=document.getElementById('all-list');if(!list)return;
      const f=S.recipes.filter(r=>{
        if(q&&!r.name.toLowerCase().includes(q)&&!(r.cuisine||'').toLowerCase().includes(q))return false;
        if(iq&&!(r.ingredients||'').toLowerCase().includes(iq))return false;
        if(tv){
          const mins=parseMins(r.cookTime);
          const tv_n=parseInt(tv);
          if(tv==='91'){if(mins===null||mins<90)return false;}
          else{if(mins===null||mins>tv_n)return false;}
        }
        return true;
      });
      if(!f.length){list.innerHTML='<div class="empty-state">No recipes match these filters</div>';return}
      list.innerHTML=f.map(r=>`
        <div class="recipe-card" onclick="openDetail(${r.id})" style="margin:0 0 8px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
            <div style="flex:1">
              <div class="rc-name">${esc(r.name)}</div>
              <div style="display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap">
                ${r.cuisine?`<span class="rc-cuisine">🌍 ${esc(r.cuisine)}</span>`:''}
                ${r.cookTime?`<span style="font-size:11px;color:var(--gray-400)">⏱ ${esc(r.cookTime)}</span>`:''}
                ${tagHtml(r.status)}
              </div>
            </div>
            ${r.rating>0?dumplingImg(r.rating,38):''}
          </div>
        </div>`).join('');
    };
    inp?.addEventListener('input',rl);
    ingInp?.addEventListener('input',rl);
    timeFilter?.addEventListener('change',rl);
    rl();
  }
}

load();render();
</script>
</body>
</html>
